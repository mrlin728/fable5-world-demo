<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenVZ World Lab</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2306080a'/%3E%3Cpath d='M16 4 27 28H5Z' fill='%235fae8f'/%3E%3Cpath d='M16 9 10 28h12Z' fill='%23c8d8d0' opacity='.55'/%3E%3C/svg%3E" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #030607;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #9ccdc1;
        font-size: 13px;
        pointer-events: none;
        transition: opacity 0.5s ease;
        z-index: 70;
        background:
          radial-gradient(circle at 50% 35%, rgba(57, 255, 210, 0.16), transparent 32%),
          linear-gradient(135deg, #030607 0%, #07110f 46%, #020304 100%);
      }
      #boot .title {
        font-size: clamp(26px, 4vw, 48px);
        color: #c8d8d0;
        margin-bottom: 14px;
        letter-spacing: -0.02em;
        font-weight: 700;
      }
      #boot .bar {
        width: min(360px, 64vw);
        height: 2px;
        background: rgba(120, 255, 216, 0.14);
        margin-top: 16px;
        position: relative;
        overflow: hidden;
      }
      #boot .bar > div {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        background: linear-gradient(90deg, #62f2bd, #68d8ff);
        transition: width 0.2s ease;
        box-shadow: 0 0 18px rgba(98, 242, 189, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <div class="title">OpenVZ World Lab</div>
      <div id="boot-msg">initializing</div>
      <div class="bar"><div id="boot-bar"></div></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
